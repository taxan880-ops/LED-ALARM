<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>LED Alarm Clock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      background: #000; 
      color: #0f0; 
      font-family: 'Courier New', monospace; 
      height: 100vh; 
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    body { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
    }
    #clock { 
      font-size: 20vw; 
      margin: 20px; 
      text-shadow: 0 0 20px #0f0, 0 0 40px #0f0; 
      font-weight: bold;
    }
    #alarm { font-size: 5vw; margin: 15px; opacity: 0.8; }
    #status { font-size: 3.5vw; margin: 10px; color: #888; min-height: 4vw; }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }
    button { 
      background: #0f0; 
      color: #000; 
      border: none; 
      padding: 18px 40px; 
      font-size: 4.5vw; 
      margin: 8px;
      border-radius: 8px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      width: 60vw;
    }
    button:active { background: #0a0; transform: scale(0.98); }
    input[type="time"] { 
      font-size: 5vw; 
      padding: 12px; 
      margin: 10px; 
      background: #111; 
      color: #0f0; 
      border: 2px solid #0f0;
      border-radius: 8px;
      text-align: center;
      font-family: 'Courier New', monospace;
      width: 60vw;
    }
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) sepia(1) saturate(5) hue-rotate(90deg);
    }
    .ringing {
      animation: flash 0.3s infinite alternate;
    }
    @keyframes flash {
      from { background: #000; }
      to { background: #f00; }
    }
  </style>
</head>
<body id="body">
  <div id="clock">00:00:00</div>
  <div id="alarm">No alarm set</div>
  <div id="status">Set alarm time below</div>
  <div class="controls">
    <input type="time" id="timeInput">
    <button onclick="setAlarm()">SET ALARM</button>
    <button onclick="stopAlarm()">STOP ALARM</button>
  </div>
  
  <script>
    let alarmTime = null;
    let alarmInterval = null;
    let isRinging = false;
    let wakeLock = null;
    
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (err) {
        console.log('Wake lock failed:', err);
      }
    }
    
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;
      
      if (alarmTime && !isRinging) {
        const current = `${h}:${m}`;
        if (current === alarmTime && s === '00') {
          ringAlarm();
        }
      }
    }
    
    function setAlarm() {
      const input = document.getElementById('timeInput').value;
      if (input) {
        alarmTime = input;
        document.getElementById('alarm').textContent = `Alarm: ${input}`;
        document.getElementById('status').textContent = 'Alarm active';
        requestWakeLock();
      } else {
        document.getElementById('status').textContent = 'Please select a time';
      }
    }
    
    function ringAlarm() {
      isRinging = true;
      document.getElementById('status').textContent = 'WAKE UP!';
      document.getElementById('body').classList.add('ringing');
      
      // Vibrate pattern: vibrate 500ms, pause 200ms, repeat
      if (navigator.vibrate) {
        alarmInterval = setInterval(() => {
          navigator.vibrate([500, 200, 500, 200, 500]);
        }, 2000);
      }
    }
    
    function stopAlarm() {
      isRinging = false;
      alarmTime = null;
      clearInterval(alarmInterval);
      document.getElementById('body').classList.remove('ringing');
      document.getElementById('alarm').textContent = 'No alarm set';
      document.getElementById('status').textContent = 'Alarm cleared';
      if (navigator.vibrate) navigator.vibrate(0);
      if (wakeLock) wakeLock.release();
    }
    
    // Update clock every second
    setInterval(updateClock, 1000);
    updateClock();
    
    // Request wake lock on load to keep screen on
    requestWakeLock();
  </script>
</body>
</html>
